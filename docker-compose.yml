services:
  # ==========================================
  # MySQL 数据库
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: lingxun-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lingxun123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lingxun}
      MYSQL_USER: ${MYSQL_USER:-lingxun}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lingxun123}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-lingxun123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingxun

  # ==========================================
  # Redis 缓存 & 消息队列
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: lingxun-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-lingxun123}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lingxun123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingxun

  # ==========================================
  # Elasticsearch 搜索引擎
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: lingxun-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lingxun

  # ==========================================
  # NestJS 后端服务
  # ==========================================
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: lingxun-server
    restart: unless-stopped
    # 不对外暴露端口，仅通过 nginx 内部网络访问 server:3001
    # 如需直接调试可临时取消注释: ports: ["3001:3001"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-lingxun}:${MYSQL_PASSWORD:-lingxun123}@mysql:3306/${MYSQL_DATABASE:-lingxun}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-lingxun123}
      - JWT_SECRET=${JWT_SECRET:-lingxun-super-secret-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-lingxun-refresh-secret-key-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
      - UPLOAD_DIR=./uploads
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lingxun

  # ==========================================
  # Next.js 前端服务
  # ==========================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lingxun-web
    restart: unless-stopped
    # 不对外暴露端口，仅通过 nginx 内部网络访问 web:3000
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lingxun

  # ==========================================
  # Nginx 反向代理（HTTP-only，适配无域名部署场景）
  # 如需启用 HTTPS：将 nginx-http.conf 换回 nginx.conf，恢复 443 端口和 ssl volume
  # ==========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: lingxun-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx-http.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - lingxun

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local
  uploads_data:
    driver: local

networks:
  lingxun:
    driver: bridge
